<svg width="1000" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262D" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="400" fill="#0D1117"/>
  <rect width="1000" height="400" fill="url(#grid)"/>

  <!-- Logo/Graphic -->
  <!-- Um carrinho de e-commerce estilizado com um gráfico de tendência refletindo conversões e dados -->
  <g transform="translate(120, 100)">
    <!-- Corpo do Carrinho -->
    <path d="M 10 20 L 30 20 L 50 100 L 120 100 L 140 35 L 35 35" fill="none" stroke="#00D4AA" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Rodas -->
    <circle cx="65" cy="130" r="12" fill="#58A6FF"/>
    <circle cx="105" cy="130" r="12" fill="#58A6FF"/>
    
    <!-- Linha de Tendência (Analytics / Crescimento) -->
    <path d="M 55 75 L 80 45 L 100 60 L 145 10" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="145" cy="10" r="8" fill="#FFFFFF"/>
  </g>

  <!-- Main Text -->
  <text x="320" y="180" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="800" fill="#FFFFFF" letter-spacing="1">
    E-COMMERCE ANALYTICS
  </text>
  <text x="320" y="225" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#8B949E">
    Modelagem Estatística de Consumo e Conversão
  </text>

  <!-- Tech Badges -->
  <g transform="translate(320, 265)">
    <!-- Python -->
    <rect x="0" y="0" width="90" height="30" rx="4" fill="#3776AB"/>
    <text x="45" y="20" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PYTHON</text>

    <!-- NumPy -->
    <rect x="100" y="0" width="90" height="30" rx="4" fill="#013243"/>
    <text x="145" y="20" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">NUMPY</text>

    <!-- Pandas -->
    <rect x="200" y="0" width="90" height="30" rx="4" fill="#150458"/>
    <text x="245" y="20" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PANDAS</text>

    <!-- Data Viz (Seaborn/Matplotlib) -->
    <rect x="300" y="0" width="90" height="30" rx="4" fill="#11557C"/>
    <text x="345" y="20" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DATA VIZ</text>
  </g>
</svg>
