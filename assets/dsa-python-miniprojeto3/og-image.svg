<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad)"/>
  
  <!-- Accent Line -->
  <rect x="0" y="0" width="10" height="630" fill="#00D4AA"/>
  
  <!-- Main Title -->
  <text x="80" y="180" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="70" font-weight="800" fill="#FFFFFF" filter="url(#shadow)">
    E-commerce Analytics
  </text>
  <text x="80" y="260" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="40" font-weight="400" fill="#00D4AA" letter-spacing="2">
    STATISTICAL DATA MODELING
  </text>
  
  <!-- Content Area -->
  <rect x="80" y="320" width="60" height="4" fill="#30363D"/>
  
  <text x="80" y="380" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="300" fill="#C9D1D9">
    Advanced user segmentation and conversion analysis
  </text>
  <text x="80" y="420" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="300" fill="#C9D1D9">
    powered by NumPy engine.
  </text>
  
  <!-- Signature -->
  <rect x="80" y="520" width="300" height="60" rx="30" fill="#21262D" stroke="#30363D" stroke-width="1"/>
  <text x="110" y="558" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF">
    Authored by Athos Roque
  </text>
  
  <!-- Tech Icons / Labels -->
  <g transform="translate(850, 530)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#8B949E" text-anchor="end">PYTHON • NUMPY • SEABORN</text>
  </g>
</svg>
